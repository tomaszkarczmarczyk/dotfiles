"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$package\
$lua\
$nodejs\
$sudo\
$cmd_duration\
$line_break\
$character"""

[character]
